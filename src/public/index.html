<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>

<body>
    <main class="container-sm position-absolute top-50 start-50 translate-middle position-absolute top-50 start-50 translate-middle shadow-lg p-3 mb-5 bg-body rounded ml-5 mr-5">
        <header>
            <h1>Sistema de Produtos</h1>
        </header>
        <hr class="border border-primary border-3 opacity-75">
        <section class="container-sm">
            <form class="form w-50 p-3 " id="formProdutos">
                <input class="form-control mt-2 " type="hidden" id="id">
                <input class="form-control mt-2" type="text" id="nome" placeholder="Nome">
                <input class="form-control mt-2" type="text" id="descricao" placeholder="Descrição">
                <input class="form-control mt-2" type="number" id="preco" placeholder="Preço">
                <input class="form-control mt-2" type="number" id="estoque" placeholder="Estoque">
                <select class="form-select mt-2" name="categoria" id="categoria">
                    <option value="Pelúcia">Pelúcia</option>
                    <option value="Brinquedo">Brinquedo</option>
                    <option value="Action Figure">Action Figure</option>
                </select>
                <button class="btn btn-primary mt-2" type="submit">Salvar</button>
            </form>
        </section>
        <hr class="border border-primary border-3 opacity-75">
        <section class="list-section">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaProdutos"></tbody>
            </table>
        </section>
        <footer>
            <p>Sistema desenvolvido por Rafael Marmitt | Senac Competições: Pré-Seletiva</p>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
